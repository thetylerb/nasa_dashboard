version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nasa_pipeline
      POSTGRES_USER: nasa
      POSTGRES_PASSWORD: nasa_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nasa -d nasa_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
